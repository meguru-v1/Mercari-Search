name: Update Mercari Prices

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # 手動実行用

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install
        # ブラウザの依存関係をインストール
        npx puppeteer browsers install chrome

    - name: Run Scraper
      run: npm run scrape

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add client/public/price_history.json
        git commit -m "chore: update prices [skip ci]" || echo "No changes to commit"
        git push
