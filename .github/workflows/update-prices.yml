name: Update Mercari Prices

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # 手動実行用

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install root dependencies
      run: |
        npm ci || npm install --no-save
        npx puppeteer browsers install chrome

    - name: Install client dependencies
      run: |
        cd client
        npm ci || npm install --no-save

    - name: Run Scraper
      run: npm run scrape

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        # 意図しない変更（package-lock.json等）をリセット
        git checkout package-lock.json || true
        git checkout client/package-lock.json || true
        
        git add client/public/price_history.json client/public/tracked_items.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: update prices and item names [skip ci]"
          git pull --rebase origin main
          git push
        fi

    - name: Build
      run: |
        cd client
        npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './client/dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
